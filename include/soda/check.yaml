checks for yt_api:

  - missing_count("Video_id") = 0:
          name: Ensure there are no null values in the Video_Id column
  - duplicate_count("Video_id") = 0:
          name: No duplicate video IDs
  - likes_count_greater_than_vid_viwes = 0:
          name: Likes count should be less than or equal to video views
          likes_count_greater_than_vid_viwes query: |
            SELECT COUNT(*) AS likes_count_greater_than_vid_viwes
            FROM yt_api
            WHERE "Like_Count" > "View_Count";
  - comments_count_greater_than_vid_viwes = 0:
          name: Comments count should be less than or equal to video views
          comments_count_greater_than_vid_viwes query: |
            SELECT COUNT(*) AS comments_count_greater_than_vid_viwes
            FROM yt_api
            WHERE "Comment_Count" > "View_Count";